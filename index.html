<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accelerate - Wall of Honour</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="The official digital Wall of Honour for Accelerate. Celebrating the builders, developers, and creators who join our club.">
  
  <!-- Google Fonts for Classical Honours Board Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --gold-light: #fcf6ba;
      --gold-med: #dfb76c;
      --gold-dark: #aa771c;
      --gold-shadow: rgba(170, 119, 28, 0.4);
      --wood-dark: #1f0b02;
      --wood-base: #351507;
      --wood-light: #4a200f;
      --wall-bg: #121415;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--wall-bg);
      background-image: 
        radial-gradient(circle at 50% 30%, rgba(218, 165, 32, 0.15) 0%, transparent 60%),
        linear-gradient(to bottom, #161819, #0f1011);
      font-family: 'Cormorant Garamond', serif;
      color: #eaeaea;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Ambient spotlight effect */
    .spotlight {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      height: 600px;
      background: radial-gradient(circle at 50% 0%, rgba(252, 246, 186, 0.08) 0%, rgba(223, 183, 108, 0.03) 40%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      z-index: 10;
      position: relative;
    }

    .subtitle {
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      color: var(--gold-med);
      margin-bottom: 0.5rem;
      font-weight: 500;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .main-title {
      font-family: 'Cinzel', serif;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      text-shadow: 0 0 20px rgba(252, 246, 186, 0.2), 0 2px 10px rgba(0,0,0,0.9);
      margin-bottom: 1rem;
    }

    .description {
      font-size: 1.15rem;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
      color: #b0b5b8;
      font-style: italic;
    }

    /* Honours Board Container */
    .board-container {
      width: 100%;
      max-width: 900px;
      background: 
        linear-gradient(90deg, rgba(0,0,0,0.15) 0%, transparent 1%, transparent 99%, rgba(0,0,0,0.15) 100%),
        linear-gradient(to right, var(--wood-dark) 0%, var(--wood-base) 10%, var(--wood-light) 25%, var(--wood-base) 50%, var(--wood-light) 75%, var(--wood-base) 90%, var(--wood-dark) 100%);
      border: 16px solid #230d04;
      outline: 3px solid var(--gold-med);
      outline-offset: -8px;
      border-radius: 4px;
      box-shadow: 
        inset 0 0 30px rgba(0,0,0,0.95),
        0 15px 35px rgba(0,0,0,0.8),
        0 5px 15px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
      padding: 3rem 2.5rem;
      margin-bottom: 3rem;
    }

    /* Wood planks panel lines overlay */
    .board-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 148px,
        rgba(0, 0, 0, 0.3) 148px,
        rgba(0, 0, 0, 0.35) 150px,
        rgba(255, 255, 255, 0.03) 150px,
        transparent 152px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Top Brass Plaque */
    .brass-plaque {
      background: linear-gradient(135deg, #eed799 0%, #d4af37 30%, #b8860b 50%, #d4af37 70%, #fae6b1 100%);
      border: 3px double #5a450c;
      box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.4),
        0 4px 8px rgba(0,0,0,0.5);
      border-radius: 2px;
      padding: 1rem 2rem;
      text-align: center;
      margin: -1.5rem auto 2.5rem auto;
      max-width: 550px;
      position: relative;
      z-index: 5;
    }

    /* Plaque Screws */
    .brass-plaque::before, .brass-plaque::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: #5a450c;
      border-radius: 50%;
      box-shadow: inset 0 1px 1px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.3);
    }
    .brass-plaque::before { left: 10px; }
    .brass-plaque::after { right: 10px; }

    .brass-title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #2b1c04;
      letter-spacing: 0.15em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    }

    /* Honours Board Grid Table */
    .honours-table {
      width: 100%;
      border-collapse: collapse;
      position: relative;
      z-index: 5;
    }

    .honours-header th {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      color: var(--gold-med);
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--gold-dark);
      text-transform: uppercase;
      text-align: left;
      font-weight: 700;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    }

    .honours-header th.num-col { width: 8%; }
    .honours-header th.name-col { width: 30%; }
    .honours-header th.project-col { width: 42%; }
    .honours-header th.username-col { width: 20%; }

    .honours-row {
      transition: background-color 0.3s ease;
      border-bottom: 1px solid rgba(170, 119, 28, 0.15);
    }

    .honours-row:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .honours-row td {
      padding: 1.25rem 1rem;
      font-size: 1.25rem;
      vertical-align: middle;
      color: var(--gold-light);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
      letter-spacing: 0.02em;
    }

    /* Lord's Cricket Ground style painted gold text */
    .honours-row td.name-cell {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      color: #f7e7c4;
      background: linear-gradient(to bottom, #fff 20%, var(--gold-light) 50%, var(--gold-med) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(1px 1px 1px rgba(0,0,0,0.9));
    }

    .honours-row td.num-cell {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      color: var(--gold-med);
      opacity: 0.8;
    }

    .honours-row td.project-cell {
      font-style: italic;
      font-weight: 400;
      font-size: 1.15rem;
      color: #e2d2b5;
    }

    .honours-row td.username-cell a {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gold-med);
      text-decoration: none;
      border: 1px solid rgba(223, 183, 108, 0.3);
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      transition: all 0.3s ease;
      background: rgba(0,0,0,0.2);
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .honours-row td.username-cell a:hover {
      background: var(--gold-med);
      color: #1f0b02;
      border-color: var(--gold-med);
      box-shadow: 0 0 10px var(--gold-shadow);
      transform: translateY(-1px);
    }

    /* Action button to join wall */
    .action-container {
      text-align: center;
      margin-top: 1.5rem;
      z-index: 10;
    }

    .cta-button {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #1f0b02;
      background: linear-gradient(135deg, #eed799 0%, #d4af37 50%, #b8860b 100%);
      border: 2px solid #5a450c;
      padding: 0.85rem 2.25rem;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.4);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255,255,255,0.4);
      background: linear-gradient(135deg, #fae6b1 0%, #e5c158 50%, #cca025 100%);
    }

    .cta-button:active {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    footer {
      margin-top: auto;
      padding: 2rem 0 1rem 0;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      color: #62686c;
      letter-spacing: 0.05em;
      z-index: 10;
    }

    footer a {
      color: #92999e;
      text-decoration: none;
      transition: color 0.3s;
    }

    footer a:hover {
      color: var(--gold-med);
    }

    /* Skeleton Loading State */
    .skeleton-row td {
      padding: 1.5rem 1rem;
    }
    .skeleton-text {
      height: 16px;
      background: rgba(223, 183, 108, 0.1);
      border-radius: 4px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .skeleton-text.short { width: 40%; }
    .skeleton-text.medium { width: 75%; }
    .skeleton-text.long { width: 90%; }

    @keyframes pulse {
      0% { opacity: 0.3; }
      50% { opacity: 0.6; }
      100% { opacity: 0.3; }
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .main-title { font-size: 1.8rem; }
      .description { font-size: 1rem; }
      .board-container {
        padding: 2rem 1.25rem;
        border-width: 10px;
      }
      .brass-plaque {
        padding: 0.75rem 1rem;
        margin-bottom: 1.5rem;
      }
      .brass-title { font-size: 1.1rem; }
      .honours-row td {
        padding: 1rem 0.5rem;
        font-size: 1rem;
      }
      .honours-row td.project-cell {
        font-size: 0.95rem;
      }
      .honours-row td.username-cell a {
        font-size: 0.75rem;
        padding: 0.25rem 0.5rem;
      }
      .honours-header th {
        font-size: 0.8rem;
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="spotlight"></div>

  <header>
    <div class="subtitle">Accelerate Initiative</div>
    <h1 class="main-title">THE WALL OF HONOUR</h1>
    <p class="description">Celebrating the builders, developers, and creators who join our club.</p>
  </header>

  <main class="board-container">
    <div class="brass-plaque">
      <h2 class="brass-title">COHORT HONOURS BOARD</h2>
    </div>

    <table class="honours-table" id="honours-table">
      <thead>
        <tr class="honours-header">
          <th class="num-col">No.</th>
          <th class="name-col">Member Name</th>
          <th class="project-col">Maiden Project</th>
          <th class="username-col">Credentials</th>
        </tr>
      </thead>
      <tbody id="board-body">
        <!-- Loading skeletons before data is fetched -->
        <tr class="skeleton-row">
          <td><div class="skeleton-text short"></div></td>
          <td><div class="skeleton-text medium"></div></td>
          <td><div class="skeleton-text long"></div></td>
          <td><div class="skeleton-text short"></div></td>
        </tr>
        <tr class="skeleton-row">
          <td><div class="skeleton-text short"></div></td>
          <td><div class="skeleton-text medium"></div></td>
          <td><div class="skeleton-text long"></div></td>
          <td><div class="skeleton-text short"></div></td>
        </tr>
        <tr class="skeleton-row">
          <td><div class="skeleton-text short"></div></td>
          <td><div class="skeleton-text medium"></div></td>
          <td><div class="skeleton-text long"></div></td>
          <td><div class="skeleton-text short"></div></td>
        </tr>
      </tbody>
    </table>
  </main>

  <div class="action-container">
    <a href="https://github.com/accelerate-muj/welcome-mural" class="cta-button" target="_blank" rel="noopener">
      🖋️ JOIN THE WALL OF HONOUR
    </a>
  </div>

  <footer>
    <p>© 2026 Accelerate Guild. Inspired by the Lord's Honours Boards. | <a href="https://github.com/accelerate-muj/welcome-mural" target="_blank" rel="noopener">View Source on GitHub</a></p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const boardBody = document.getElementById('board-body');

      // Fetch the WALL.md file
      fetch('./WALL.md')
        .then(response => {
          if (!response.ok) {
            throw new Error(`Failed to load WALL.md: ${response.statusText}`);
          }
          return response.text();
        })
        .then(markdown => {
          const lines = markdown.split(/\r?\n/);
          
          // Filter out lines that are not part of the table body
          const tableLines = lines.filter(line => {
            const trimmed = line.trim();
            // Must start and end with |
            if (!trimmed.startsWith('|') || !trimmed.endsWith('|')) return false;
            
            // Ignore table headers and separators
            const lower = trimmed.toLowerCase();
            if (lower.includes('name') && lower.includes('project')) return false;
            if (trimmed.includes('---') || trimmed.includes(':---')) return false;
            
            return true;
          });

          // Parse table rows
          const entries = tableLines.map(line => {
            // Split by '|' and remove empty elements at start/end
            const cols = line.split('|').map(c => c.trim()).filter((_, idx, arr) => idx > 0 && idx < arr.length - 1);
            if (cols.length < 2) return null;

            // Name: strip markdown bold ** or *
            const rawName = cols[0] || '';
            const name = rawName.replace(/\*\*|\*/g, '').trim();

            // Project: strip markdown formatting if any
            const project = cols[1] || '';

            // GitHub Username & Link: parse [name](url) or @name
            const rawGithub = cols[2] || '';
            let githubName = '';
            let githubUrl = '';

            const mdLinkRegex = /\[@?([^\]]+)\]\(([^)]+)\)/;
            const match = rawGithub.match(mdLinkRegex);
            if (match) {
              githubName = match[1];
              githubUrl = match[2];
            } else {
              githubName = rawGithub.replace(/[@]/g, '').trim();
              githubUrl = githubName ? `https://github.com/${githubName}` : '';
            }

            return { name, project, githubName, githubUrl };
          }).filter(entry => entry !== null && entry.name !== '');

          // Clear loading skeletons
          boardBody.innerHTML = '';

          // If no entries, render a placeholder row
          if (entries.length === 0) {
            boardBody.innerHTML = `
              <tr>
                <td colspan="4" style="text-align: center; color: var(--gold-med); font-style: italic; padding: 2rem;">
                  No names inscribed on the board yet. Be the first!
                </td>
              </tr>
            `;
            return;
          }

          // Populate the Honours Board
          entries.forEach((entry, index) => {
            const row = document.createElement('tr');
            row.className = 'honours-row';

            // Pad the number (e.g. 01, 02)
            const displayNo = String(index + 1).padStart(2, '0');

            // GitHub link HTML
            let githubHTML = '';
            if (entry.githubName) {
              githubHTML = `
                <a href="${entry.githubUrl}" target="_blank" rel="noopener">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                  </svg>
                  @${entry.githubName}
                </a>
              `;
            } else {
              githubHTML = `<span style="color: var(--gold-dark); opacity: 0.5;">-</span>`;
            }

            row.innerHTML = `
              <td class="num-cell">${displayNo}</td>
              <td class="name-cell">${entry.name}</td>
              <td class="project-cell">${entry.project}</td>
              <td class="username-cell">${githubHTML}</td>
            `;

            boardBody.appendChild(row);
          });
        })
        .catch(err => {
          console.error(err);
          boardBody.innerHTML = `
            <tr>
              <td colspan="4" style="text-align: center; color: #ff6b6b; padding: 2rem;">
                Failed to load Honours Board entries.
              </td>
            </tr>
          `;
        });
    });
  </script>
</body>
</html>
